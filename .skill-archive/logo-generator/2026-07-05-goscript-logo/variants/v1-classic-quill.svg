<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0d0d0d"/>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7A00"/>
      <stop offset="100%" stop-color="#FF5500"/>
    </linearGradient>
  </defs>
  <!-- Main G arc -->
  <path d="M 50 20 A 30 30 0 0 0 20 50 A 30 30 0 0 0 50 80" fill="none" stroke="url(#g1)" stroke-width="14" stroke-linecap="round"/>
  <!-- G crossbar -->
  <path d="M 35 50 L 75 50" fill="none" stroke="url(#g1)" stroke-width="14" stroke-linecap="round"/>
  <!-- Quill nib at bottom -->
  <path d="M 50 80 L 50 95" fill="none" stroke="url(#g1)" stroke-width="10" stroke-linecap="round"/>
  <path d="M 42 90 L 50 98 L 58 90 Z" fill="#FF7A00"/>
  <!-- Feather barbs on left arc -->
  <path d="M 28 30 L 15 22" stroke="#FF7A00" stroke-width="3" stroke-linecap="round"/>
  <path d="M 22 40 L 8 36" stroke="#FF7A00" stroke-width="3" stroke-linecap="round"/>
  <path d="M 20 52 L 6 52" stroke="#FF7A00" stroke-width="3" stroke-linecap="round"/>
  <path d="M 24 64 L 10 70" stroke="#FF7A00" stroke-width="3" stroke-linecap="round"/>
  <!-- Nib slit -->
  <line x1="50" y1="95" x2="50" y2="98" stroke="#0d0d0d" stroke-width="2"/>
</svg>
