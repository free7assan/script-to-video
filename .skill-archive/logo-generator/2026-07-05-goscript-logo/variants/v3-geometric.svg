<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0d0d0d"/>
  <!-- Thick G shape - circle minus bottom-left quadrant -->
  <path d="M 55 20 
           A 30 30 0 0 0 25 50 
           A 30 30 0 0 0 55 80 
           L 55 65 
           A 15 15 0 0 1 40 50 
           A 15 15 0 0 1 55 35 
           L 55 20 Z" fill="#FF7A00"/>
  <!-- Feather quill as sharp geometric stroke -->
  <polygon points="45,80 55,80 50,96" fill="#FF7A00"/>
  <!-- Crossbar accent -->
  <rect x="25" y="47" width="50" height="6" rx="3" fill="#0d0d0d"/>
  <!-- Feather barb accents - sharp triangles -->
  <polygon points="28,30 35,28 25,18" fill="#FF7A00"/>
  <polygon points="22,42 29,42 18,36" fill="#FF7A00"/>
  <polygon points="20,56 29,56 16,56" fill="#FF7A00"/>
  <polygon points="24,70 32,68 18,76" fill="#FF7A00"/>
</svg>
