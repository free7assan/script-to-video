<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0d0d0d"/>
  <defs>
    <radialGradient id="nodeGrad">
      <stop offset="0%" stop-color="#FF7A00"/>
      <stop offset="100%" stop-color="#FF5500"/>
    </radialGradient>
  </defs>
  <!-- Connecting paths forming G -->
  <g fill="none" stroke="#FF7A00" stroke-width="2.5" stroke-linecap="round">
    <!-- G outer arc -->
    <path d="M 55 20 Q 25 20 22 40 Q 19 60 30 72 Q 45 85 58 78"/>
    <!-- G crossbar -->
    <path d="M 30 50 L 72 50"/>
    <!-- Feather stem -->
    <path d="M 55 70 L 52 90"/>
    <!-- Connection lines -->
    <path d="M 55 20 L 45 28 L 38 38 L 30 50"/>
    <path d="M 22 40 L 18 32"/>
    <path d="M 25 65 L 14 70"/>
    <path d="M 40 78 L 30 85"/>
    <path d="M 30 72 L 20 80"/>
  </g>
  <!-- Nodes -->
  <g fill="url(#nodeGrad)">
    <circle cx="55" cy="20" r="5"/>
    <circle cx="22" cy="40" r="4.5"/>
    <circle cx="30" cy="72" r="4.5"/>
    <circle cx="58" cy="78" r="4"/>
    <circle cx="30" cy="50" r="5"/>
    <circle cx="72" cy="50" r="4"/>
    <!-- Feather barb ends -->
    <circle cx="18" cy="32" r="3.5"/>
    <circle cx="14" cy="70" r="3.5"/>
    <circle cx="20" cy="80" r="3.5"/>
    <circle cx="30" cy="85" r="3"/>
    <circle cx="45" cy="28" r="3"/>
    <circle cx="38" cy="38" r="3"/>
    <!-- Nib -->
    <circle cx="52" cy="90" r="4"/>
  </g>
</svg>
