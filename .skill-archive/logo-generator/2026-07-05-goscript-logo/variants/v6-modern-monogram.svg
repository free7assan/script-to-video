<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0d0d0d"/>
  <!-- Abstract modern G where the feather IS the letter -->
  <g fill="none" stroke="#FF7A00" stroke-linecap="round" stroke-linejoin="round">
    <!-- G as a flowing ribbon that splits into feather -->
    <path d="M 55 15 
             C 30 15, 18 28, 18 50 
             C 18 72, 30 85, 55 85 
             L 55 72 
             C 40 72, 35 62, 35 50 
             C 35 38, 40 28, 55 28 
             Z" stroke-width="6"/>
    <!-- Feather strokes emerging from the G's bottom -->
    <path d="M 40 72 L 45 88" stroke-width="5"/>
    <path d="M 50 85 L 55 95" stroke-width="5"/>
    <path d="M 58 72 L 62 86" stroke-width="5"/>
    <!-- Feather barbs as elegant tapered lines on the left -->
    <path d="M 30 22 L 12 14" stroke-width="4"/>
    <path d="M 22 35 L 6 30" stroke-width="3.5"/>
    <path d="M 20 50 L 4 52" stroke-width="3"/>
    <path d="M 22 65 L 8 70" stroke-width="3.5"/>
    <path d="M 30 78 L 16 86" stroke-width="4"/>
  </g>
  <!-- Accent dot -->
  <circle cx="70" cy="28" r="4" fill="#FF7A00"/>
</svg>
